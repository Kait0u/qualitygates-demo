name: Pull Request Quality Gates

on:
  pull_request:
    branches: [ master ]

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Disable shallow clone — required for SonarCloud blame information
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # 2. Setup JDK 21
      # -----------------------------------------------------------------------
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # -----------------------------------------------------------------------
      # Cache SonarCloud packages
      # -----------------------------------------------------------------------
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # -----------------------------------------------------------------------
      # 3. Build (compile only — tests run as a separate gate below)
      # -----------------------------------------------------------------------
      - name: Build
        run: ./gradlew build -x test

      # -----------------------------------------------------------------------
      # 4. Gate 1 — Test Execution
      #    All tests must pass; build fails otherwise.
      # -----------------------------------------------------------------------
      - name: Run tests
        run: ./gradlew test

      # -----------------------------------------------------------------------
      # 5. Gate 2 — JaCoCo Coverage
      #    Line-instruction coverage must be >= 80%.
      # -----------------------------------------------------------------------
      - name: JaCoCo coverage verification
        run: ./gradlew jacocoTestCoverageVerification

      # -----------------------------------------------------------------------
      # 6. Gate 3 — Trivy Security Scan
      #    Scans the repository filesystem for vulnerable dependencies.
      #    Fails if any HIGH or CRITICAL severity CVE is found (CVSS >= 7.0).
      # -----------------------------------------------------------------------
      - name: Generate SBOM
        run: ./gradlew cyclonedxBom

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: sbom
          scan-ref: build/reports/bom.json
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: 1
          format: table

      # -----------------------------------------------------------------------
      # 7. Gate 4 — SonarCloud Static Analysis
      #    Waits for SonarCloud Quality Gate result; fails if gate is not met.
      #
      #    Required repository secrets (Settings → Secrets and variables → Actions):
      #      SONAR_TOKEN       — SonarCloud user token
      #      SONAR_PROJECT_KEY — e.g. my-org_qualitygates-demo
      #      SONAR_ORG         — SonarCloud organisation slug
      # -----------------------------------------------------------------------
      - name: SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORG: ${{ secrets.SONAR_ORG }}
        run: >
          ./gradlew sonar
          -Dsonar.qualitygate.wait=true
