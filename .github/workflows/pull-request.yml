name: Pull Request Quality Gates

on:
  pull_request:
    branches: [ master ]

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Disable shallow clone — required for SonarCloud blame information
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # 2. Setup JDK 21
      # -----------------------------------------------------------------------
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # -----------------------------------------------------------------------
      # Cache SonarCloud packages
      # -----------------------------------------------------------------------
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # -----------------------------------------------------------------------
      # Cache OWASP NVD database (large ~300 MB download on first run)
      # -----------------------------------------------------------------------
      - name: Cache OWASP NVD data
        uses: actions/cache@v4
        with:
          path: ~/.gradle/dependency-check-data
          key: ${{ runner.os }}-owasp-${{ hashFiles('build.gradle.kts') }}
          restore-keys: ${{ runner.os }}-owasp-

      # -----------------------------------------------------------------------
      # 3. Build (compile only — tests run as a separate gate below)
      # -----------------------------------------------------------------------
      - name: Build
        run: ./gradlew build -x test

      # -----------------------------------------------------------------------
      # 4. Gate 1 — Test Execution
      #    All tests must pass; build fails otherwise.
      # -----------------------------------------------------------------------
      - name: Run tests
        run: ./gradlew test

      # -----------------------------------------------------------------------
      # 5. Gate 2 — JaCoCo Coverage
      #    Line-instruction coverage must be >= 80%.
      # -----------------------------------------------------------------------
      - name: JaCoCo coverage verification
        run: ./gradlew jacocoTestCoverageVerification

      # -----------------------------------------------------------------------
      # 6. Gate 3 — OWASP Dependency-Check (Security)
      #    Build fails if any dependency has CVSS score >= 7.0.
      # -----------------------------------------------------------------------
      - name: OWASP Dependency-Check
        run: ./gradlew dependencyCheckAnalyze

      # -----------------------------------------------------------------------
      # 7. Gate 4 — SonarCloud Static Analysis
      #    Waits for SonarCloud Quality Gate result; fails if gate is not met.
      #
      #    Required repository secrets:
      #      SONAR_TOKEN — your SonarCloud user/project token
      #
      #    Required repository variables (or set SONAR_PROJECT_KEY / SONAR_ORG
      #    env vars in the job, or hard-code them in build.gradle.kts):
      #      SONAR_PROJECT_KEY — e.g. my-org_quality-gates-demo
      #      SONAR_ORG         — your SonarCloud organisation slug
      # -----------------------------------------------------------------------
      - name: SonarCloud analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORG: ${{ vars.SONAR_ORG }}
        run: >
          ./gradlew sonar
          -Dsonar.qualitygate.wait=true
